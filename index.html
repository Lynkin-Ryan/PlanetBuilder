<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Rebuilder - Sandbox Simulation Game</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Patrick Hand', cursive;
    background:#0a0f1a;
    color:white;
}

.hero {
    background:url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1400&q=60') center/cover no-repeat;
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1 {
    font-size:4rem;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
}

.hero p {
    font-size:1.4rem;
    max-width:700px;
    margin:20px auto;
    text-shadow:0 0 10px rgba(0,0,0,0.8);
}

.hero button {
    padding:15px 30px;
    font-size:1.2rem;
    background:#4caf50;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.hero button:hover {
    background:#3d8f42;
    transform:scale(1.05);
}

/* popup overlay */
.popup {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s ease;
}

/* active popup */
.popup.active {
    opacity:1;
    pointer-events:auto;
}

/* popup content box */
.popup-box {
    background:#111827;
    padding:30px 25px;
    border-radius:12px;
    text-align:center;
    max-width:400px;
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    animation:fadeInPopup 0.4s ease;
}

@keyframes fadeInPopup {
    from { transform: translateY(-20px); opacity:0; }
    to { transform: translateY(0); opacity:1; }
}

.popup-box h2 {
    margin-top:0;
    font-size:2rem;
}

.popup-box p {
    margin:15px 0 0 0;
    font-size:1.1rem;
}

.popup-box button {
    margin-top:20px;
    padding:12px 25px;
    font-size:1rem;
    border:none;
    border-radius:8px;
    background:#4caf50;
    color:white;
    cursor:pointer;
}

.popup-box button:hover {
    background:#3d8f42;
}

footer{
    background:#05080f;
    padding:20px;
    text-align:center;
    color:#888;
    margin-top:40px;
}
</style>
</head>

<body>

<div class="hero">
    <div>
        <h1>Planet Rebuilder</h1>
        <p>Create, restore, and reshape entire worlds in the ultimate sandbox ecosystem simulator.</p>
        <button id="playBtn">Play Now</button>
    </div>
</div>

<footer>
    © 2025 Planet Rebuilder — Sandbox Planet Simulation
</footer>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-box">
        <h2>🚀 Not Out Yet</h2>
        <p>Planet Rebuilder is still in development.</p>
        <p><b>Sike… not out yet!</b></p>
        <button id="closeBtn">Got It</button>
    </div>
</div>

<script>
const playBtn = document.getElementById('playBtn');
const popup = document.getElementById('popup');
const closeBtn = document.getElementById('closeBtn');

playBtn.addEventListener('click', () => {
    popup.classList.add('active');
});

closeBtn.addEventListener('click', () => {
    popup.classList.remove('active');
});

// Optional: close popup by clicking outside the box
popup.addEventListener('click', (e) => {
    if(e.target === popup){
        popup.classList.remove('active');
    }
});
</script>

</body>
</html>
